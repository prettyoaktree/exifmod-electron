# Build and publish Windows artifacts to GitHub Releases when a version tag is pushed.
# Publishes alongside the macOS job; electron-updater uses latest.yml on Windows.

name: Release (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:github

      - name: Upload NSIS SHA256 for winget manifest bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $VERSION = node -p "require('./package.json').version"
          $TAG = "v${VERSION}"
          $EXE = "release/EXIFmod-${VERSION}-setup.exe"
          $OUT = "release/EXIFmod-${VERSION}-setup.exe.sha256"
          if (-not (Test-Path $EXE)) { throw "Missing $EXE" }
          $hash = (Get-FileHash -Algorithm SHA256 -Path $EXE).Hash.ToLower()
          $name = Split-Path $EXE -Leaf
          # LF + UTF-8 no BOM (matches shasum / Unix; avoids CRLF confusing parsers)
          $line = "${hash}  ${name}"
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          $fullOut = Join-Path (Get-Location) $OUT
          [System.IO.File]::WriteAllText($fullOut, $line + "`n", $utf8NoBom)
          gh release upload $TAG $OUT --clobber --repo $env:GITHUB_REPOSITORY
