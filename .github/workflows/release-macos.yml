# Build, sign, notarize, and publish macOS artifacts to GitHub Releases when a version tag is pushed.
# Required repo secrets (see maintainer.md): CSC_LINK, CSC_KEY_PASSWORD,
# APPLE_API_KEY_P8_BASE64, APPLE_API_KEY_ID, APPLE_API_ISSUER

name: Release (macOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Prepare App Store Connect API key for notarytool
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          KEY_DIR="$RUNNER_TEMP/asc"
          mkdir -p "$KEY_DIR"
          echo -n "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$KEY_DIR/AuthKey.p8"
          echo "APPLE_API_KEY=$KEY_DIR/AuthKey.p8" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:github

      - name: Upload DMG SHA256 for Homebrew cask bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          DMG="release/EXIFmod-${VERSION}.dmg"
          OUT="release/EXIFmod-${VERSION}.dmg.sha256"
          test -f "$DMG"
          shasum -a 256 "$DMG" | tee "$OUT"
          gh release upload "$TAG" "$OUT" --clobber --repo "${GITHUB_REPOSITORY}"
